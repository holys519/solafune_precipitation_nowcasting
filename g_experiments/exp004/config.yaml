experiment:
  name: exp004
  description: "Exp004: two-head rain/no-rain detection + rain amount regression"
  seed: 42

data:
  train_csv: ../../data/train_dataset/train_dataset.csv
  evaluation_csv: ../../data/evaluation_dataset/evaluation_target.csv
  train_dir: ../../data/train_dataset
  evaluation_dir: ../../data/evaluation_dataset
  sample_submission_dir: ../../data/sample_submission
  max_observations: 3
  satellite_channels: 16
  target_height: 41
  target_width: 41

split:
  strategy: group_kfold
  n_splits: 5
  fold: 0
  max_train_samples: null   # full data
  max_valid_samples: null

train:
  batch_size: 128
  epochs: 20
  lr: 0.001
  weight_decay: 0.0001
  num_workers: 12
  amp: true
  grad_clip_norm: 1.0
  augment: true

model:
  architecture: two_head_compact_unet
  in_channels: 54
  base_channels: 48
  encoder_name: efficientnet-b0
  encoder_weights: imagenet
  encoder_depth: 3
  decoder_channels: [128, 64, 32]
  clip_min: 0.0

loss:
  name: two_head_rain
  rain_threshold: 0.0
  pos_weight: 2.0
  bce_weight: 0.1
  bce_pos_weight: 3.0
  amount_weight: 0.5
  prediction_weight: 1.0

tta:
  enabled: true
  flip: true

postprocess:
  use_oof_calibration: false
  rain_prob_threshold: 0.0
  rain_prob_threshold_grid: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90, 0.95]
  calibration_path: ../../outputs/analysis/exp004/oof_calibration.json

paths:
  model_dir: ../../g_model/exp004
  output_dir: ../../outputs/submissions/exp004
  submission_zip: ../../outputs/submissions/exp004_submission.zip
  analysis_dir: ../../outputs/analysis/exp004
  norm_stats: norm_stats.json
