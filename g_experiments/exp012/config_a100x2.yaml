# Ticket G-003 (doc/task_tickets.md): A100 x2 profile.
# Larger VRAM allows a bigger batch; LR scaled up with sqrt of the batch ratio.
# Drafted without A100 hardware available for validation -- confirm batch fits and
# throughput scales on the first real run, adjust batch_size/num_workers to the node.

experiment:
  name: exp012
  description: "Exp012 on A100 x2: satellite-adapter two-head model with successor-row satellite frames"
  seed: 42

data:
  train_csv: ../../data/train_dataset/train_dataset.csv
  evaluation_csv: ../../data/evaluation_dataset/evaluation_target.csv
  train_dir: ../../data/train_dataset
  evaluation_dir: ../../data/evaluation_dataset
  sample_submission_dir: ../../data/sample_submission
  max_observations: 3
  context_rows: 2
  satellite_channels: 16
  target_height: 41
  target_width: 41

split:
  strategy: group_kfold
  n_splits: 5
  fold: 0
  max_train_samples: null
  max_valid_samples: null

train:
  batch_size: 256
  epochs: 20
  lr: 0.0014
  weight_decay: 0.0001
  num_workers: 16
  amp: true
  grad_clip_norm: 1.0
  augment: true

model:
  architecture: satellite_adapter_two_head_unet
  in_channels: 105
  base_channels: 48
  encoder_name: efficientnet-b0
  encoder_weights: imagenet
  encoder_depth: 3
  decoder_channels: [128, 64, 32]
  clip_min: 0.0

loss:
  name: two_head_rain
  rain_threshold: 0.0
  pos_weight: 2.0
  bce_weight: 0.1
  bce_pos_weight: 3.0
  amount_weight: 0.5
  prediction_weight: 1.0

tta:
  enabled: true
  flip: true

metric:
  selection: tile_rmse

postprocess:
  use_oof_calibration: false
  rain_prob_threshold: 0.0
  rain_prob_threshold_grid: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90, 0.95]
  value_threshold: 0.10
  value_threshold_grid: [0.0, 0.01, 0.03, 0.05, 0.08, 0.10, 0.12, 0.15, 0.20, 0.25]
  temporal_smoothing:
    enabled: false
    center_weight: 0.70
    prev_weight: 0.15
    next_weight: 0.15
    max_gap_minutes: 30
  calibration_path: ../../outputs/analysis/exp012/oof_calibration.json

paths:
  model_dir: ../../g_model/exp012
  output_dir: ../../outputs/submissions/exp012
  submission_zip: ../../outputs/submissions/exp012_submission.zip
  analysis_dir: ../../outputs/analysis/exp012
  norm_stats: norm_stats.json
