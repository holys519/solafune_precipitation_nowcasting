experiment:
  name: exp013
  description: "Exp013-ctx: predecessor+successor context only, no registration (G-018 isolation)"
  seed: 42

data:
  train_csv: ../../data/train_dataset/train_dataset.csv
  evaluation_csv: ../../data/evaluation_dataset/evaluation_target.csv
  train_dir: ../../data/train_dataset
  evaluation_dir: ../../data/evaluation_dataset
  sample_submission_dir: ../../data/sample_submission
  max_observations: 3
  # Row offsets in 30-minute steps; must include 0. [0, 1] reproduces exp009/exp012.
  context_offsets: [-1, 0, 1]
  satellite_channels: 16
  target_height: 41
  target_width: 41

# G-017: per-(location, satellite) parallax correction using the l_eda median shifts.
# Tables live in this experiment dir (copied from outputs/l_eda/exp001, which is gitignored).
registration:
  enabled: false
  shift_table: parallax_shift_by_location.csv
  eval_location_table: train_eval_feature_shift.csv
  min_corr_gain: 0.0    # skip shifts whose measured OOF corr gain is below this

split:
  strategy: group_kfold
  n_splits: 5
  fold: 0
  max_train_samples: null   # full data
  max_valid_samples: null

train:
  batch_size: 128
  epochs: 20
  lr: 0.001
  weight_decay: 0.0001
  num_workers: 12
  amp: true
  grad_clip_norm: 1.0
  augment: true

model:
  # two_head_compact_unet = exp009's proven arm, so OOF deltas attribute cleanly to the
  # dataset changes above. satellite_adapter_two_head_unet stays selectable (exp012's arm).
  architecture: two_head_compact_unet
  # 16ch x 3 obs x 3 context rows + 9 masks + 3 satellite one-hot = 156.
  in_channels: 156
  base_channels: 48
  encoder_name: efficientnet-b0
  encoder_weights: imagenet
  encoder_depth: 3
  decoder_channels: [128, 64, 32]
  clip_min: 0.0

loss:
  name: two_head_rain
  rain_threshold: 0.0
  pos_weight: 2.0
  bce_weight: 0.1
  bce_pos_weight: 3.0
  amount_weight: 0.5
  prediction_weight: 1.0

tta:
  enabled: true
  flip: true

metric:
  selection: tile_rmse

postprocess:
  use_oof_calibration: false
  # "linear" = existing pred*scale+bias fit. "isotonic" = monotonic pred->target curve fit
  # from a binned OOF pixel histogram (G-027a); falls back to linear if oof_calibration.json
  # has no usable isotonic curve (e.g. not yet regenerated by analyze_oof.py).
  calibration_mode: linear
  rain_prob_threshold: 0.0
  rain_prob_threshold_grid: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90, 0.95]
  value_threshold: 0.10
  value_threshold_grid: [0.0, 0.01, 0.03, 0.05, 0.08, 0.10, 0.12, 0.15, 0.20, 0.25]
  temporal_smoothing:
    enabled: false
    center_weight: 0.70
    prev_weight: 0.15
    next_weight: 0.15
    max_gap_minutes: 30
  calibration_path: ../../outputs/analysis/exp013/oof_calibration.json

paths:
  model_dir: ../../g_model/exp013
  output_dir: ../../outputs/submissions/exp013
  submission_zip: ../../outputs/submissions/exp013_submission.zip
  analysis_dir: ../../outputs/analysis/exp013
  norm_stats: norm_stats.json
