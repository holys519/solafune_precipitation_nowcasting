experiment:
  name: exp015
  description: "Exp015 (G-027a): isotonic OOF calibration on top of exp009's checkpoints, no new training"
  seed: 42

data:
  train_csv: ../../data/train_dataset/train_dataset.csv
  evaluation_csv: ../../data/evaluation_dataset/evaluation_target.csv
  train_dir: ../../data/train_dataset
  evaluation_dir: ../../data/evaluation_dataset
  sample_submission_dir: ../../data/sample_submission
  max_observations: 3
  context_rows: 2
  satellite_channels: 16
  target_height: 41
  target_width: 41

# split must match exp009's exactly (n_splits/fold/seed) -- analyze_oof.py uses this to
# reconstruct the same GroupKFold validation rows that exp009's checkpoints were held out on.
split:
  strategy: group_kfold
  n_splits: 5
  fold: 0
  max_train_samples: null   # full data
  max_valid_samples: null

# Not used by the submit/submit_calibrated run.sh stages (this experiment trains nothing), kept
# only so train.py stays runnable/self-contained if ever needed.
train:
  batch_size: 128
  epochs: 20
  lr: 0.001
  weight_decay: 0.0001
  num_workers: 12
  amp: true
  grad_clip_norm: 1.0
  augment: true

# Must match exp009's architecture exactly -- this is what build_model() uses to load exp009's
# state_dict.
model:
  architecture: two_head_compact_unet
  in_channels: 105
  base_channels: 48
  encoder_name: efficientnet-b0
  encoder_weights: imagenet
  encoder_depth: 3
  decoder_channels: [128, 64, 32]
  clip_min: 0.0

loss:
  name: two_head_rain
  rain_threshold: 0.0
  pos_weight: 2.0
  bce_weight: 0.1
  bce_pos_weight: 3.0
  amount_weight: 0.5
  prediction_weight: 1.0

tta:
  enabled: true
  flip: true

metric:
  selection: tile_rmse

postprocess:
  use_oof_calibration: false
  # This experiment's whole point is the isotonic curve (G-027a); default to it here so
  # "submit_calibrated" produces an isotonic-calibrated submission without extra flags. Set to
  # "linear" for an apples-to-apples comparison run against exp009's original linear scale/bias.
  calibration_mode: isotonic
  rain_prob_threshold: 0.0
  rain_prob_threshold_grid: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90, 0.95]
  value_threshold: 0.10
  value_threshold_grid: [0.0, 0.01, 0.03, 0.05, 0.08, 0.10, 0.12, 0.15, 0.20, 0.25]
  temporal_smoothing:
    enabled: false
    center_weight: 0.70
    prev_weight: 0.15
    next_weight: 0.15
    max_gap_minutes: 30
  calibration_path: ../../outputs/analysis/exp015/oof_calibration.json

paths:
  # model_dir stays exp015-local (unused fallback only -- train.py is not run by the intended
  # stages, so nothing is ever written under g_model/exp015 in practice).
  model_dir: ../../g_model/exp015
  # source_model_dir is where analyze_oof.py/inference.py actually read checkpoints from: exp009's
  # own model directory, read-only. Same "reuse another experiment's checkpoints without touching
  # it" pattern exp008 already uses for exp004 (see g_experiments/exp008/config.yaml).
  source_model_dir: ../../g_model/exp009
  output_dir: ../../outputs/submissions/exp015
  submission_zip: ../../outputs/submissions/exp015_submission.zip
  analysis_dir: ../../outputs/analysis/exp015
  norm_stats: norm_stats.json
