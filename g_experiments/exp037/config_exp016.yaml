experiment:
  name: exp016
  description: 'Exp016 (G-030): hurdle log-normal head on exp009''s successor-row
    inputs'
  seed: 42
data:
  train_csv: ../../data/train_dataset/train_dataset.csv
  evaluation_csv: ../../data/evaluation_dataset/evaluation_target.csv
  train_dir: ../../data/train_dataset
  evaluation_dir: ../../data/evaluation_dataset
  sample_submission_dir: ../../data/sample_submission
  max_observations: 3
  context_rows: 2
  satellite_channels: 16
  target_height: 41
  target_width: 41
  drop_zero_obs_rows: true
split:
  strategy: group_kfold
  n_splits: 5
  fold: 0
  max_train_samples: null
  max_valid_samples: null
train:
  batch_size: 128
  epochs: 100
  lr: 0.001
  weight_decay: 0.0001
  num_workers: 12
  amp: true
  grad_clip_norm: 1.0
  augment: true
model:
  architecture: hurdle_lognormal_unet
  in_channels: 105
  base_channels: 48
  encoder_name: efficientnet-b0
  encoder_weights: imagenet
  encoder_depth: 3
  decoder_channels:
  - 128
  - 64
  - 32
  clip_min: 0.0
  sigma_mode: predicted
  fixed_sigma: 1.0
  mu_min: -6.0
  mu_max: 5.0
  sigma_min: 0.1
  sigma_max: 2.0
  amount_cap: 150.0
  serving_sigma_scale: 1.0
loss:
  name: hurdle_lognormal
  rain_threshold: 0.0
  bce_weight: 1.0
  intensity_weight: 1.0
  prediction_weight: 0.0
  min_wet_target: 0.01
tta:
  enabled: true
  flip: true
  rot90: true
metric:
  selection: tile_rmse
postprocess:
  use_oof_calibration: false
  calibration_mode: linear
  rain_prob_threshold: 0.0
  rain_prob_threshold_grid:
  - 0.05
  - 0.1
  - 0.15
  - 0.2
  - 0.25
  - 0.3
  - 0.35
  - 0.4
  - 0.45
  - 0.5
  - 0.55
  - 0.6
  - 0.65
  - 0.7
  - 0.75
  - 0.8
  - 0.85
  - 0.9
  - 0.95
  value_threshold: 0.1
  value_threshold_grid:
  - 0.0
  - 0.01
  - 0.03
  - 0.05
  - 0.08
  - 0.1
  - 0.12
  - 0.15
  - 0.2
  - 0.25
  temporal_smoothing:
    enabled: false
    center_weight: 0.7
    prev_weight: 0.15
    next_weight: 0.15
    max_gap_minutes: 30
  calibration_path: ../../outputs/analysis/exp016/oof_calibration.json
paths:
  model_dir: ../../g_model/exp016
  output_dir: ../../outputs/submissions/exp037/exp016
  submission_zip: ../../outputs/submissions/exp037/exp016_unused.zip
  analysis_dir: ../../outputs/analysis/exp016
  norm_stats: norm_stats.json
