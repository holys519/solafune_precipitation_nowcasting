experiment:
  name: exp040
  description: "Arm D retry: metric_weight 0.3->0.6 (fold0 won -0.0011, fold4 lost +0.0017 at 0.3; one bounded retry per survey stop rules)"
  seed: 42

data:
  train_csv: ../../data/train_dataset/train_dataset.csv
  evaluation_csv: ../../data/evaluation_dataset/evaluation_target.csv
  train_dir: ../../data/train_dataset
  evaluation_dir: ../../data/evaluation_dataset
  sample_submission_dir: ../../data/sample_submission
  max_observations: 3
  context_rows: 1
  satellite_channels: 16
  target_height: 41
  target_width: 41
  drop_zero_obs_rows: true

# Strict-green arm: raw distributed bands only, same as exp038's config.yaml.
features:
  canonical_bands: false
  engineered: false
  temporal_abs: false
  target_time_first: false
  ir_rain_proxy: false

split:
  strategy: group_kfold
  n_splits: 5
  fold: 0
  max_train_samples: null
  max_valid_samples: null

train:
  batch_size: 128
  epochs: 100
  lr: 0.001
  weight_decay: 0.0001
  num_workers: 12
  amp: true
  grad_clip_norm: 1.0
  augment: true

model:
  architecture: highres_mean_shape_unet
  in_channels: 54
  base_channels: 32
  internal_size: 128
  aux_mask_enabled: true
  rain_head_enabled: true
  clip_min: 0.0
  shape_eps: 0.0001
  mean_cap: 150.0
  bottleneck_dilations: []

loss:
  name: mean_shape
  rain_threshold: 0.0
  # Arm C: pure mean/shape supervision, no field-level MSE (field_weight=0, metric_weight=0)
  # so the intensity head carries all the tile-scale signal, per survey v3 5.1.
  mean_weight: 1.0
  shape_weight: 1.0
  min_wet_target: 0.01
  bce_weight: 0.1
  aux_mask_weight: 0.2
  aux_mask_threshold: 0.25
  aux_dice_weight: 0.5
  multiscale_weight_2: 0.2
  multiscale_weight_4: 0.1
  field_weight: 0.0
  # Arm D: direct tile-RMSE-shaped loss matching the identified per-file evaluator
  # (l_eda/exp003). Small weight — this supplements, not replaces, mean/shape supervision.
  metric_weight: 0.6

tta:
  enabled: true
  flip: true

metric:
  selection: tile_rmse

postprocess:
  use_oof_calibration: false
  calibration_mode: linear
  rain_prob_threshold: 0.0
  rain_prob_threshold_grid: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90, 0.95]
  value_threshold: 0.10
  value_threshold_grid: [0.0, 0.01, 0.03, 0.05, 0.08, 0.10, 0.12, 0.15, 0.20, 0.25]
  temporal_smoothing:
    enabled: false
    center_weight: 0.70
    prev_weight: 0.15
    next_weight: 0.15
    max_gap_minutes: 30
  calibration_path: ../../outputs/analysis/exp040_metric/oof_calibration.json

paths:
  model_dir: ../../g_model/exp040_metric
  output_dir: ../../outputs/submissions/exp040_metric
  submission_zip: ../../outputs/submissions/exp040_metric_submission.zip
  analysis_dir: ../../outputs/analysis/exp040_metric
  norm_stats: norm_stats.json
