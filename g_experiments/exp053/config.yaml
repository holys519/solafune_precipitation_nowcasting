experiment:
  name: exp053
  description: "exp038 strict baseline + autoregressive own-past-prediction input channel (2026-07-20 ruling explicitly permits reuse of the model's own <T predictions as inference-time input, doc/submission_registry.md: '自分自身の過去(<T)の予測値の再利用(自己回帰/recursive手法)'). Teacher-forced (true GT) during train/valid, self-generated predictions substituted at eval time via a chronological per-location sequential inference loop (see inference.py)."
  seed: 42

data:
  train_csv: ../../data/train_dataset/train_dataset.csv
  evaluation_csv: ../../data/evaluation_dataset/evaluation_target.csv
  train_dir: ../../data/train_dataset
  evaluation_dir: ../../data/evaluation_dataset
  sample_submission_dir: ../../data/sample_submission
  max_observations: 3
  context_rows: 1
  satellite_channels: 16
  target_height: 41
  target_width: 41
  drop_zero_obs_rows: true

# Strict-green arm: raw distributed bands only, identical to exp038's feature set, plus the
# new autoregressive_prev_pred flag (2 channels: previous-row precip value + validity mask,
# see dataset.py's _autoregressive_prev_pred_channels). Green because the AR input is always
# causal (T-30min < T): teacher-forced with true GT during train/valid (already-known causal
# ground truth), self-generated predictions substituted at eval time (own past prediction).
features:
  canonical_bands: false
  engineered: false
  temporal_abs: false
  target_time_first: false
  ir_rain_proxy: false
  autoregressive_prev_pred: true

split:
  strategy: group_kfold
  n_splits: 5
  fold: 0
  max_train_samples: null
  max_valid_samples: null

# Training regime kept identical to exp038 so the fold0/fold4 gate against exp038's strict
# baseline numbers isolates the autoregressive-channel effect.
train:
  batch_size: 128
  epochs: 100
  lr: 0.001
  weight_decay: 0.0001
  num_workers: 12
  amp: true
  grad_clip_norm: 1.0
  augment: true

model:
  architecture: highres_hurdle_lognormal_unet
  in_channels: 56
  base_channels: 32
  internal_size: 128
  aux_mask_enabled: true
  clip_min: 0.0
  sigma_mode: predicted
  fixed_sigma: 1.0
  mu_min: -6.0
  mu_max: 5.0
  sigma_min: 0.1
  sigma_max: 2.0
  amount_cap: 150.0
  serving_sigma_scale: 1.0
  # exp030's receptive-field expansion. In this net the bottleneck sits at 8x8 (128/16), where
  # dilation 4 spans the whole grid — config_no_dilation.yaml is the arm that removes this.
  bottleneck_dilations: []

loss:
  name: hurdle_lognormal
  rain_threshold: 0.0
  bce_weight: 1.0
  intensity_weight: 1.0
  prediction_weight: 0.0
  min_wet_target: 0.01
  aux_mask_weight: 0.2
  aux_mask_threshold: 0.25
  aux_dice_weight: 0.5
  multiscale_weight_2: 0.2
  multiscale_weight_4: 0.1

tta:
  enabled: true
  flip: true

metric:
  selection: tile_rmse

postprocess:
  use_oof_calibration: false
  calibration_mode: linear
  rain_prob_threshold: 0.0
  rain_prob_threshold_grid: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90, 0.95]
  value_threshold: 0.10
  value_threshold_grid: [0.0, 0.01, 0.03, 0.05, 0.08, 0.10, 0.12, 0.15, 0.20, 0.25]
  temporal_smoothing:
    enabled: false
    center_weight: 0.70
    prev_weight: 0.15
    next_weight: 0.15
    max_gap_minutes: 30
  calibration_path: ../../outputs/analysis/exp053/oof_calibration.json

paths:
  model_dir: ../../g_model/exp053
  output_dir: ../../outputs/submissions/exp053
  submission_zip: ../../outputs/submissions/exp053_submission.zip
  analysis_dir: ../../outputs/analysis/exp053
  norm_stats: norm_stats.json
